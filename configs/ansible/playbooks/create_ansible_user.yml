# must be used with inventory_root.yml
- name: Create ansible user that can be accessed via SSH
  hosts:
    - hive01-proxmox
    - hive02-proxmox
    - mh-frame01
  vars_files:
    - ../vars/credentials.yml
  tasks:
    - name: Create ansible user
      ansible.builtin.user:
        name: ansible
        shell: /bin/bash
    - name: Allow current user to SSH into ansible user
      ansible.posix.authorized_key:
        user: ansible
        key: "{{ lookup('file', '/home/kylar/.ssh/id_rsa.pub') }}"
    - name: Install sudo
      ansible.builtin.package:
        name: sudo
        state: present
    - name: Add ansible user to sudoers
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/ansible-allow-to-sudo-all
        create: true
        state: present
        mode: "0640"
        line: "ansible ALL=(ALL) NOPASSWD:ALL"
        # https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/lineinfile_module.html#parameter-validate
        # visudo edits sudoers file safely (with syntax checks)
        # -c is check-only mode
        # -f provides alternative sudoers file name
        # %s references the temporary file created by ansible
        validate: /usr/sbin/visudo -cf %s
    - name: Check if ssh connection as ansible user already works
      ansible.builtin.shell:
        cmd: ssh "ansible@{{ ansible_host }}" -p {{ ssh_port }} -o ConnectTimeout=3 -- echo "Hello SSH!" || echo "denied"
      delegate_to: localhost
      ignore_errors: true
      changed_when: false
      register: ssh_as_ansible
    - name: Safely adjust sshd config
      when: ssh_as_ansible.stdout == "denied"
      block:
        - name: Start a temporary backup sshd service on another port
          ansible.builtin.command:
            argv:
              - /usr/sbin/sshd
              - -p
              - "2222"
              - -f
              - /dev/null # use empty config
        - name: Disallow any other connections
          ansible.builtin.template:
            src: ../templates/10-allow-local-connection.conf.jinja
            dest: /etc/ssh/sshd_config.d/10-allow-local-connection.conf
            validate: sshd -tf %s
            mode: 644
          notify: Restart sshd
        - name: Flush handlers
          meta: flush_handlers
        - name: Wait for restart
          ansible.builtin.wait_for:
            host: "{{ ansible_host }}"
            port: "{{ ssh_port }}"
            connect_timeout: 5
        - name: Test ssh connection
          ansible.builtin.command:
            argv:
              - ssh
              - "ansible@{{ ansible_host }}"
              - -p
              - "{{ ssh_port }}"
              - --
              - echo "Hello SSH!"
          delegate_to: localhost
        - name: Take down backup sshd service
          ansible.builtin.command:
            argv:
              - pkill
              - -f
              - "sshd -p 2222"
      rescue:
        - name: Revert changes to sshd config
          ansible.builtin.file:
            path: /etc/ssh/sshd_config.d/10-allow-local-connection.conf
            state: absent
          notify: Restart sshd
  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
