# must be used with inventory_root.yml
- name: Create ansible user that can be accessed via SSH
  hosts:
    - hive-proxmox
    - hive02-proxmox
    - mh-frame01
  vars_files:
    - ../vars/credentials.yml
  tasks:
    - name: Create ansible user
      ansible.builtin.user:
        name: ansible
        shell: /bin/bash
      become: true
    - name: Allow current user to SSH into ansible user
      ansible.posix.authorized_key:
        user: ansible
        key: "{{ lookup('file', '/home/kylar/.ssh/id_rsa.pub') }}"
      become: true
    - name: Install sudo
      ansible.builtin.package:
        name: sudo
        state: present
      become: true
    - name: Add ansible user to sudoers
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/ansible-allow-to-sudo-all
        create: true
        state: present
        mode: "0640"
        line: "ansible ALL=(ALL) NOPASSWD:ALL"
        # https://docs.ansible.com/projects/ansible/latest/collections/ansible/builtin/lineinfile_module.html#parameter-validate
        # visudo edits sudoers file safely (with syntax checks)
        # -c is check-only mode
        # -f provides alternative sudoers file name
        # %s references the temporary file created by ansible
        validate: /usr/sbin/visudo -cf %s
      become: true
    - name: Safely adjust sshd config
      block:
        - name: Start a temporary backup sshd service on another port
          ansible.builtin.command:
            argv:
              - sshd
              - -p
              - "2222"
              - -f
              - /dev/null # use empty config
        - name: Disallow any other connections
          ansible.builtin.template:
            src: ../templates/10-allow-local-connection.conf.jinja
            dest: /etc/ssh/sshd_config.d/10-allow-local-connection.conf
            validate: sshd -tf %s
            mode: 644
          notify: Restart sshd
          become: true
        - name: Test ssh connection
          ansible.builtin.ssh:
            host: {{ ansible_host }}
            port: 35813
            remote_user: ansible
            private_key_file: /home/kylar/.ssh/id_rsa
        - name: Take down backup sshd service
          ansible.builtin.command:
            argv:
              - pkill
              - -f
              - "sshd -p 2222"
      rescue:
        - name: Revert changes to sshd config
          ansible.builtin.file:
            path: /etc/ssh/sshd_config.d/10-allow-local-connection.conf
            state: absent
          notify: Restart sshd
  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
      become: true
