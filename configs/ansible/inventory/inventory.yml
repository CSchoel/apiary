apiary:
  hosts:
    hive01-proxmox:
      ansible_user: ansible
      ansible_host: 192.168.178.202
      ansible_port: "{{ ssh_port }}"
      ansible_become: true # become root by default
      ansible_python_interpreter: /usr/bin/python3.13
      proxmox_root_password: "{{ proxmox_ansible_password }}"
      proxmox_token: "{{ proxmox_api_token_secret }}"
      proxmox_host: hive
